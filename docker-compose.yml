services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quiqimage
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: quiqimage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiqimage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
